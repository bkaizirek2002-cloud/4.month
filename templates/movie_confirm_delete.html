{% extends "base.html" %}

{% block content %}
<h1>Удаление фильма</h1>

<p>Вы уверены, что хотите удалить фильм "<strong>{{ object.title }}</strong>"?</p>

<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Да, удалить</button>
  <a href="{% url 'movie_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
