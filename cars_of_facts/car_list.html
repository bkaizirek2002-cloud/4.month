<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список машин</title>
</head>
<body>
    <h1>Список всех автомобилей</h1>

    {% for car in cars %}
        <div style="margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px;">
            <h3>{{ car.title }}</h3>
            
            {% if car.image %}
                <img src="{{ car.image.url }}" width="200" alt="{{ car.title }}">
            {% else %}
                <p>(Изображение отсутствует)</p>
            {% endif %}

            <p><strong>Цена:</strong> {{ car.price }} $</p>
            <a href="/cars/{{ car.id }}/">Подробнее</a>
        </div>
    {% empty %}
        <p>В базе данных пока нет автомобилей.</p>
    {% endfor %}

</body>
</html>
